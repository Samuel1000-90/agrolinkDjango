{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Editar Calificación</title>
    <link rel="stylesheet" href="{% static 'css/estilos.css' %}">
</head>
<body>

<div class="container">

    <h1>✏️ Editar Calificación</h1>

    <form method="POST">
        {% csrf_token %}

        <label>Referencia</label>
        <input type="text" name="nombre" value="{{ calificacion.nombre_referencia }}">

        <label>Tipo</label>
        <input type="text" name="tipo" value="{{ calificacion.tipo }}">

        <label>Puntuación</label>
        <input type="number" name="puntuacion" value="{{ calificacion.puntuacion }}">

        <label>Comentario</label>
        <textarea name="comentario">{{ calificacion.comentario }}</textarea>

        <button type="submit" class="btn-guardar">Actualizar 🌿</button>
    </form>

</div>

</body>
</html>
