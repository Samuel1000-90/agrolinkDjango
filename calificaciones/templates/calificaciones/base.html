<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AgroLink</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #F1F8E9;
        }

        /* NAVBAR */
        .navbar {
            background-color: #2E7D32;
            padding: 15px;
            color: white;
            display: flex;
            justify-content: space-between;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
        }

        /* CONTENIDO */
        .container {
            width: 80%;
            margin: 20px auto;
        }

        /* TARJETAS */
        .card {
            background: white;
            border-left: 6px solid #2E7D32;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* BOTONES */
        .btn {
            padding: 6px 12px;
            border-radius: 5px;
            text-decoration: none;
            color: white;
        }

        .btn-verde {
            background-color: #2E7D32;
        }

        .btn-rojo {
            background-color: #c62828;
        }

        /* ESTRELLAS */
        .estrellas {
            color: #FFD54F;
            font-size: 18px;
        }

    </style>
</head>
<body>

    <div class="navbar">
        <div>
            🌾 AgroLink
        </div>

        <div>
            <a href="{% url 'lista_calificacion' %}">Calificaciones</a>
            <a href="{% url 'crear_calificacion' %}">Nueva</a>
        </div>
    </div>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
